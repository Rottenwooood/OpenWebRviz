# 机器人与服务器配置文件
# 服务器配置
server:
  host: "182.43.86.126"
  port: 4001

# Jetson 配置
# 注意：Jetson 不再通过 Tailscale 暴露服务，下面地址仅用于本地运维/SSH。
jetson:
  host: "192.168.1.58"
  user: "nvidia"
  maps_dir: "/home/nvidia/maps"
  rosbridge_port: 9090

# Rosbridge 配置
rosbridge:
  port: 9090
  address: "0.0.0.0"

# 前端配置
frontend:
  api_url: "http://182.43.86.126:4001"
  # 前端固定连接云服务器，云服务器本机再转到 Jetson 主动建立的反向隧道端口。
  ws_url: "ws://182.43.86.126/rosbridge/"

# Jetson 主动反向 SSH 到云服务器后，云服务器本机开放的回环端口
reverse_tunnel:
  rosbridge_port: 19090
  janus_http_port: 18088
  janus_demo_port: 18000
  face_port: 19100
  media_control_port: 19110
  server_host: "182.43.86.126"
  server_user: "root"

# WebRTC / Janus 媒体配置
media:
  service_name: "webbot-media.service"
  service_script_path: "/home/nvidia/bin/webbot-media.sh"
  service_unit_path: "/home/nvidia/.config/systemd/user/webbot-media.service"
  video_service_name: "webbot-video.service"
  video_script_path: "/home/nvidia/bin/webbot-video.sh"
  video_unit_path: "/home/nvidia/.config/systemd/user/webbot-video.service"
  control_service_name: "webbot-media-control.service"
  control_script_path: "/home/nvidia/bin/webbot-media-control.py"
  control_unit_path: "/home/nvidia/.config/systemd/user/webbot-media-control.service"
  # 云服务器本机通过反向隧道访问 Jetson 上的 Janus HTTP API
  janus_host: "127.0.0.1"
  janus_http_port: 18088
  janus_api_path: "/janus"
  janus_demo_port: 18000
  control_proxy_host: "127.0.0.1"
  control_proxy_port: 19110
  janus_binary: "/opt/janus/bin/janus"
  janus_html_dir: "/opt/janus/share/janus/html"
  adapter_asset: "adapter.min.js"
  janus_script_asset: "janus.js"
  streaming_path: "/demos/streaming.html#"
  audiobridge_path: "/demos/audiobridge.html"
  audio_capture_device: "plughw:CARD=UACDemoV10,DEV=0"
  audio_playback_device: "plughw:CARD=UACDemoV10,DEV=0"
  audio_capture_port: 5005
  audio_playback_port: 5006
  preferred_audio_stream_id: 99
  audiobridge_room: 1234
  audiobridge_secret: "adminpwd"
  audiobridge_forward_host: "127.0.0.1"
  audiobridge_forward_port: 5006
  audiobridge_display: "webbot-ui"
  video_device: "/dev/video0"
  video_port: 8004
  video_width: 1280
  video_height: 720
  video_framerate: "30/1"
  video_bitrate: 4000
  preferred_video_stream_id: 101

# Jetson 人脸识别服务配置
face:
  service_name: "webbot-face.service"
  service_script_path: "/home/nvidia/bin/webbot-face-service.py"
  service_unit_path: "/home/nvidia/.config/systemd/user/webbot-face.service"
  proxy_host: "127.0.0.1"
  proxy_port: 19100
  api_path: "/faces/latest"
  health_path: "/health"
  poll_interval_ms: 150
  video_device: "/dev/video0"
  frame_width: 1280
  frame_height: 720
  inference_interval_ms: 150
  score_threshold: 0.35

# 话题配置
topics:
  scan: "/scan"
  map: "/map"
  cmd_vel: "/cmd_vel"
  tf: "/tf"
  global_plan: "/plan"
  local_plan: "/local_plan"
